name: Deploy to Cloud Run

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: chatbots-1-492817
      REGION: northamerica-south1
      SERVICE: super-agent-platform
      IMAGE: gcr.io/chatbots-1-492817/super-agent-platform:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Run deploy pipeline in Cloud Build
        id: cloud_build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --config cloudbuild.deploy.yaml \
            --substitutions="_IMAGE=${{ env.IMAGE }},_REGION=${{ env.REGION }},_SERVICE=${{ env.SERVICE }}" \
            --timeout=30m \
            --async \
            --format='value(id)')
          echo "Build submitted: ${BUILD_ID}"
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for Cloud Build to finish
        run: |
          BUILD_ID="${{ steps.cloud_build.outputs.build_id }}"
          TERMINAL_FAILURE_STATES="FAILURE INTERNAL_ERROR TIMEOUT CANCELLED EXPIRED"

          for _ in {1..180}; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" --format='value(status)')
            echo "Cloud Build status: ${STATUS}"

            if [ "${STATUS}" = "SUCCESS" ]; then
              exit 0
            fi

            if echo "${TERMINAL_FAILURE_STATES}" | grep -qw "${STATUS}"; then
              echo "Cloud Build failed with status: ${STATUS}"
              gcloud builds describe "${BUILD_ID}" --format='value(logUrl)' || true
              exit 1
            fi

            sleep 10
          done

          echo "Cloud Build did not complete within the expected timeout window (30 minutes)."
          exit 1
