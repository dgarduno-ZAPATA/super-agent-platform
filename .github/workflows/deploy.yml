name: Deploy to Cloud Run

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: chatbots-1-492817
      REGION: northamerica-south1
      SERVICE: super-agent-platform
      IMAGE: gcr.io/chatbots-1-492817/super-agent-platform:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy source to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --source . \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --platform=managed \
            --update-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,EVOLUTION_BASE_URL=EVOLUTION_BASE_URL:latest,EVOLUTION_API_KEY=EVOLUTION_API_KEY:latest,EVOLUTION_INSTANCE_NAME=EVOLUTION_INSTANCE_NAME:latest,MONDAY_API_KEY=MONDAY_API_KEY:latest,MONDAY_BOARD_ID=MONDAY_BOARD_ID:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,INTERNAL_TOKEN=INTERNAL_TOKEN:latest" \
            --quiet
