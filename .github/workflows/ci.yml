name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/super_agent_platform
      APP_ENV: ci
      LOG_LEVEL: INFO
      BRAND_PATH: ./brand

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: super_agent_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d super_agent_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Prepare database extensions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d super_agent_platform -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h 127.0.0.1 -U postgres -d super_agent_platform -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

      - name: Type check core
        run: mypy core/

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v --basetemp=.pytest_tmp
