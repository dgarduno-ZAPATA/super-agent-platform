services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: super_agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d super_agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - super_agent_network

  app:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    networks:
      - super_agent_network

networks:
  super_agent_network:
    driver: bridge

volumes:
  postgres_data:
