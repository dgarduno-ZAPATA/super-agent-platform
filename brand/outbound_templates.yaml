campaigns:
  - key: reactivacion_general
    template_text: "Hola {nombre}, soy Raúl de SelecTrucks. Hace un tiempo mostraste interés en nuestros camiones. Tenemos unidades nuevas en inventario que podrían interesarte. ¿Te gustaría que te comparta opciones?"
    window_start: "09:00"
    window_end: "18:30"
    cadence_hours: 24
    audience_filter:
      source: crm
      interest: reactivacion
      last_stage: nurture
  - key: reactivacion_vehiculo
    template_text: "Hola {nombre}, soy Raúl de SelecTrucks. Vi que en su momento te interesó un {vehiculo_previo}. Actualmente tenemos opciones similares disponibles. ¿Quieres que te mande información?"
    window_start: "10:00"
    window_end: "17:00"
    cadence_hours: 48
    audience_filter:
      source: crm
      interest: vehiculo_previo
      last_stage: contacted
  - key: reactivacion_precio
    template_text: "Hola {nombre}, soy Raúl de SelecTrucks. Tenemos promociones especiales en unidades seminuevas este mes. ¿Te interesa que te comparta las opciones disponibles?"
    window_start: "10:00"
    window_end: "18:30"
    cadence_hours: 24
    audience_filter:
      source: crm
      interest: precio
      last_stage: nurture
