steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --quiet

images:
  - ${_IMAGE}

substitutions:
  _IMAGE: gcr.io/chatbots-1-492817/super-agent-platform:latest
  _REGION: northamerica-south1
  _SERVICE: super-agent-platform
